<section class="bg-poc-features">
  <div class="container mx-auto px-4 py-20 content-frame">
    <h1 class="text-4xl extra-bold uppercase mb-8">
      <span class="text-leobit-gradient">POC</span> <span class="text-white"> FEATURES</span>
    </h1>

    <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4 text-sm">
      <div *ngFor="let feature of features" class="p-4 flex flex-col justify-start bg-feature-card">
        <div class="text-leobit-green mb-4" [innerHTML]="feature.icon">
        </div>
        <div class="text-white text-sm mb-8">
          <span class="font-bold">{{ feature.title }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
