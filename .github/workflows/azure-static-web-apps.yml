name: CI/CD - Deploy on PR

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deploy_backend:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy .NET API
    outputs:
      api_url: ${{ steps.resolve.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish .NET API
        run: dotnet publish src/backend/PocNexus/PocNexus/PocNexus.csproj -c Release -o publish

      - name: Resolve API URL
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "api_url=${{ vars.AZURE_API_URL_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "api_url=${{ vars.AZURE_API_URL_PROD }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to App Service staging slot (PR)
        if: github.event_name == 'pull_request'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: publish

      - name: Deploy to App Service production (main)
        if: github.event_name == 'push'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish

  deploy_frontend:
    if: github.event.action != 'closed'
    needs: deploy_backend
    runs-on: ubuntu-latest
    name: Build and Deploy Angular SWA
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Inject backend URL into environment.prod.ts
        working-directory: src/frontend
        run: |
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            backendUrl: '${{ needs.deploy_backend.outputs.api_url }}'
          };
          EOF

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build Angular app
        working-directory: src/frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "src/frontend/dist/poc-nexus/browser"
          skip_app_build: true
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Preview Environment
    steps:
      - name: Close Pull Request Preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_API_TOKEN }}
          action: close
